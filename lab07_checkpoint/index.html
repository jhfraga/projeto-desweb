<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Ibmec</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="form-card">
        <div class="form-card__header">
            <h1>Cadastro de Aluno - Ibmec</h1>
            <p>Preencha os dados abaixo para realizar sua matrícula</p>
        </div>

        <div class="form-body">
            <form action="/cadastro" method="post">          
                
                <div class="campo">
                    <label for="nome">Nome completo: <span class="req">*</span></label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="campo">
                    <label for="email">E-mail: <span class="req">*</span></label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="campo">
                    <label for="cpf">CPF: <span class="req">*</span></label>
                    <input type="text" id="cpf" name="cpf" inputmode="numeric" pattern="[0-9]{11}" placeholder="000.000.000-00" aria-describedby="dica-cpf" required>
                    <span id="dica-cpf" class="hint">Digite apenas os 11 números.</span>
                </div>

                <div class="campo">
                    <label for="data-nascimento">Data de Nascimento: <span class="req">*</span></label>
                    <input type="date" id="data-nascimento" name="data_nascimento" required>
                </div>

                <div class="campo">
                    <label for="curso">Curso: <span class="req">*</span></label>
                    <div class="select-wrap">
                        <select id="curso" name="curso" required>
                            <option value="">Selecione...</option>
                            <option value="ciencia-dados">Ciência de Dados</option>
                            <option value="eng-computacao">Engenharia de Computação</option>
                            <option value="eng-software">Engenharia de Software</option>
                        </select>
                    </div>
                </div>

                <fieldset>
                    <legend>Turno de preferência:</legend> 
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="turno" value="manha" required> Manhã
                        </label>
                        <label>
                            <input type="radio" name="turno" value="tarde" required> Tarde
                        </label>
                        <label>
                            <input type="radio" name="turno" value="noite" required> Noite
                        </label>
                    </div>
                </fieldset>

                <div class="campo">
                    <div class="check-group">
                        <label>
                            <input type="checkbox" id="aceite-termos" name="aceite_termos" required> Li e aceito os termos
                        </label>
                    </div>
                </div>

                <div class="btn-row">
                    <button type="submit" class="btn-primary">Enviar Cadastro</button>
                    <button type="reset" class="btn-secondary">Limpar Formulário</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
